services:
  - type: worker          # background worker, not a web server
    name: telegram-sub-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: UPI_ID
        sync: false
      - key: MONGO_URI
        sync: false
